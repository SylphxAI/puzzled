version = "1"

[project]
name = "puzzled-monorepo"
slug = "puzzled"
org = "sylphx"

[build]
strategy = "dockerfile"
dockerfile = "apps/puzzled/Dockerfile"
context = "."

[[services]]
name = "web"
type = "worker"
release_command = "atlas migrate apply --env production --baseline 20260222000000"

# Rust API authority — strangler sidecar until auth/read parity (ADR-168).
[[services]]
name = "api"
type = "web"
port = 8080
# Platform edge strangler: route S0–S2 Rust paths to api (not Next.js).
path_prefixes = [
  "/healthz",
  "/readyz",
  "/api/leaderboard",
  "/api/v1/stats/leaderboard",
  "/api/v1/puzzles/grid",
  "/api/v1/puzzles/submit",
]
watch_paths = [
  "crates/puzzled-server/**",
  "crates/puzzled-core/**",
  "Cargo.toml",
  "Cargo.lock",
  "sylphx.toml",
]
[services.build]
strategy = "dockerfile"
dockerfile = "crates/puzzled-server/Dockerfile"
context = "."
[services.health]
mode = "http"
path = "/healthz"
