version = "1"

[project]
name = "puzzled-monorepo"
slug = "puzzled"
org = "sylphx"

[build]
strategy = "dockerfile"
dockerfile = "apps/puzzled/Dockerfile"
context = "."

[[services]]
name = "web"
type = "worker"
release_command = "atlas migrate apply --env production --baseline 20260222000000"

# Rust owns the product API. Next.js owns presentation and web-only adapters.
[[services]]
name = "api"
type = "web"
port = 8080
# Route the complete public API namespace to Rust; no dual backend remains.
path_prefixes = [
  "/healthz",
  "/readyz",
  "/api/leaderboard",
  "/api/v1",
  "/api/webhooks/platform-jobs",
]
watch_paths = [
  "crates/puzzled-server/**",
  "crates/puzzled-core/**",
  "Cargo.toml",
  "Cargo.lock",
  "sylphx.toml",
]
[services.build]
strategy = "dockerfile"
dockerfile = "crates/puzzled-server/Dockerfile"
context = "."
[services.health]
mode = "http"
path = "/healthz"
