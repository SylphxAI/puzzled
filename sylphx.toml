version = "1"

[project]
name = "puzzled-monorepo"

[build]
strategy = "dockerfile"
dockerfile = "apps/puzzled/Dockerfile"
context = "."

[[services]]
name = "web"
type = "worker"
# Platform injects API_INTERNAL_URL for private web → api calls (connect graph).
# Public /api/* still routes via path_prefixes on the api service edge.
connect = { services = ["api"] }
release_command = "atlas migrate apply --env production --baseline 20260222000000"

# Rust owns the product API. Next.js owns presentation and web-only adapters.
[[services]]
name = "api"
type = "web"
port = 8080
# Route the complete public API namespace to Rust; no dual backend remains.
path_prefixes = [
  "/healthz",
  "/readyz",
  "/api/leaderboard",
  "/api/v1",
]
# /api/webhooks/platform-jobs stays on web residual executor until Rust job
# adapters own full I/O (LLM/DB/email/DLQ). See ADR-169 residual section.
watch_paths = [
  "crates/puzzled-server/**",
  "crates/puzzled-core/**",
  "Cargo.toml",
  "Cargo.lock",
  "sylphx.toml",
]

[services.health]
mode = "http"
# ADR-141 single path.
path = "/healthz"

[services.build]
strategy = "dockerfile"
dockerfile = "crates/puzzled-server/Dockerfile"
context = "."
