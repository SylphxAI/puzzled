name: Deploy to Staging

on:
  push:
    branches: [dev]
    paths:
      - 'apps/**'
      - 'packages/**'

concurrency:
  group: puzzled-staging-build
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push puzzled:staging
    runs-on: sylphx-docker
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: registry.sylphx.com
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build and push puzzled staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/puzzled/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://staging.puzzled.gg
            NEXT_PUBLIC_SYLPHX_APP_ID=${{ secrets.NEXT_PUBLIC_SYLPHX_APP_ID_STAGING }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          tags: |
            registry.sylphx.com/sylphx/puzzled:staging
            registry.sylphx.com/sylphx/puzzled:${{ github.sha }}
          cache-from: type=registry,ref=registry.sylphx.com/sylphx/puzzled:buildcache
          cache-to: type=registry,ref=registry.sylphx.com/sylphx/puzzled:buildcache,mode=max

  deploy:
    name: Deploy via Sylphx Platform (Staging)
    runs-on: sylphx-standard
    needs: [build]
    steps:
      - name: Deploy puzzled-staging
        run: |
          RESP=$(curl -sf \
            -X POST 'http://app.sylphx-platform.svc.cluster.local:3000/api/v1/projects/${{ secrets.PUZZLED_APP_ID }}/deploy' \
            -H 'Authorization: Bearer ${{ secrets.SYLPHX_DEPLOY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d "{\"envType\":\"staging\",\"image\":\"registry.sylphx.com/sylphx/puzzled:${{ github.sha }}\"}")
          echo "puzzled-staging: $RESP"
          echo "✅ puzzled-staging deployment queued"
