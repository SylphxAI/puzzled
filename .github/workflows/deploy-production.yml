name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

concurrency:
  group: puzzled-prod-build
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push puzzled:latest
    runs-on: sylphx-standard
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event.inputs.confirm == 'deploy'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: registry.sylphx.com
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Set up Docker Buildx (remote BuildKit)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.arc-runners.svc.cluster.local:1234

      - name: Build and push puzzled production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/puzzled/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=https://puzzled.gg
            NEXT_PUBLIC_SYLPHX_APP_ID=${{ secrets.NEXT_PUBLIC_SYLPHX_APP_ID }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          tags: |
            registry.sylphx.com/sylphx/puzzled:latest
            registry.sylphx.com/sylphx/puzzled:${{ github.sha }}
          cache-from: type=registry,ref=registry.sylphx.com/sylphx/puzzled:latest
          cache-to: type=inline

  deploy:
    name: Deploy via Sylphx Platform
    runs-on: sylphx-standard
    needs: [build]
    steps:
      - name: Deploy puzzled-prod
        run: |
          RESP=$(curl -sf \
            -X POST 'http://app.sylphx-platform.svc.cluster.local:3000/api/v1/projects/${{ secrets.PUZZLED_APP_ID }}/deploy' \
            -H 'Authorization: Bearer ${{ secrets.SYLPHX_DEPLOY_TOKEN }}' \
            -H 'Content-Type: application/json' \
            -d "{\"envType\":\"production\",\"image\":\"registry.sylphx.com/sylphx/puzzled:${{ github.sha }}\"}")
          echo "puzzled-prod: $RESP"
          echo "✅ puzzled deployed: ${{ github.sha }}"

  migrate:
    name: Run DB Migrations
    runs-on: sylphx-standard
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Atlas
        run: |
          mkdir -p /tmp/atlas-bin
          curl -sL "https://atlasbinaries.com/atlas/atlas-linux-amd64-latest" \
            -o /tmp/atlas-bin/atlas
          chmod +x /tmp/atlas-bin/atlas
          echo "/tmp/atlas-bin" >> "$GITHUB_PATH"

      - name: Apply migrations
        run: |
          atlas migrate apply \
            --env production \
            --baseline 20260222000000 \
            --dir "file://apps/puzzled/atlas/migrations"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
